<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algorithm Simulator</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <header>
    <div class="logo">Algorithm Simulator</div>
    <nav>
        <button class="nav-btn active" onclick="filterAlgorithms('sorting')">Sorting</button>
        <button class="nav-btn" onclick="filterAlgorithms('graph')">Graph Theory</button>
        <button class="nav-btn" onclick="filterAlgorithms('dp')">Dynamic Programming</button>
        <button class="nav-btn" onclick="filterAlgorithms('math')">Math</button>
    </nav>
</header>
    <div class="container">
        <aside class="sidebar">
            <h3>Danh sách thuật toán</h3>
            <ul id="algo-list">
                </ul>
        </aside>
       <main class="simulation-arena">
    <div class="arena-header">
        <h2 id="algo-title">Bubble Sort</h2>
        <div class="controls">
            <button onclick="generateData()">Tạo dữ liệu</button>
            <div class="speed-control" style="margin: 0 15px; display: flex; align-items: center; gap: 10px;">
                <label for="speedSlider">Tốc độ:</label>
                <input type="range" id="speedSlider" min="10" max="2000" value="750" oninput="updateSpeed()">
            </div>
            <button onclick="startSimulation()" class="btn-primary" id="btn-run">Chạy</button>
            <button onclick="togglePause()" class="btn-warning" id="btn-pause" disabled>Tạm dừng</button>
            <input type="number" id="binary-input" placeholder="Nhập số cần tìm..." style="display: none; width: 120px; padding: 5px; margin-right: 10px;">
            <select id="seg-mode" style="display: none; padding: 5px; margin-right: 10px; border-radius: 4px;">
                <option value="sum">Chế độ: Tổng (Sum)</option>
                <option value="min">Chế độ: Min</option>
                <option value="max">Chế độ: Max</option>
            </select>
        </div>
    </div>

    <div id="legend-container" class="legend-box"></div>
    <div id="visualizer-container" class="visualizer">
    </div>

    <div class="status-bar">
        <p id="status-text">Trạng thái: Sẵn sàng</p>
    </div>
</main>

        <aside class="details-panel">
            <div class="tabs">
                <button class="tab active">Mô tả</button>
                <button class="tab">Code (C++)</button>
            </div>
            <div class="content">
                <p id="algo-desc">Mô tả thuật toán sẽ hiện ở đây...</p>
                
                <div class="complexity">
                    <p>Time: <span class="tag" id="time-complexity">?</span></p>
                    <p>Space: <span class="tag" id="space-complexity">?</span></p>
                </div>
                
                <pre><code id="algo-code">
// Code mẫu sẽ hiện ở đây khi bạn chọn thuật toán
                </code></pre>
            </div>
        </aside>

    </div>

    <script src="script.js"></script>
</body>
</html>
